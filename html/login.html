<div id="loginScreen" class="login-wrapper">

  <div class="login-card">
    <h2>Madhav Street POS</h2>
    <p>Staff Login</p>

    <form id="loginForm" onsubmit="doLogin(); return false;">

      <!-- USERNAME -->
      <div class="filter-group">
        <label for="loginUsername">Username</label>

        <input
          type="text"
          id="loginUsername"
          placeholder="Enter username"
          autocomplete="username"
          required
          autofocus
        />
      </div>

      <!-- PASSWORD -->
      <div class="password-field" id="pwdField">

        <input
          type="password"
          id="loginPassword"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >

        <button
          type="button"
          id="showPasswordBtn"
          class="toggle-password"
          aria-label="Show password"
          title="Show password"
        >
          <img class="icon icon-eye"
               src="assets/icons/eye.svg"
               width="18"
               height="18"
               alt="Show">

          <img class="icon icon-eye-off"
               src="assets/icons/eye-off.svg"
               width="18"
               height="18"
               alt="Hide">
        </button>

      </div>

      <!-- REMEMBER -->
      <div class="row remember-row">
        <label class="remember">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
      </div>

      <!-- LOGIN BUTTON -->
      <button type="submit">Login</button>

    </form>

    <!-- ERROR -->
    <p id="loginError" class="login-error"></p>

  </div>

</div>

<script>
(function(){

  const pwd = document.getElementById("loginPassword");
  const btn = document.getElementById("showPasswordBtn");
  const field = document.getElementById("pwdField");

  if (pwd && btn && field) {

    btn.addEventListener("click", () => {
      const isPwd = pwd.type === "password";
      pwd.type = isPwd ? "text" : "password";

      field.classList.toggle("showing", isPwd);

      btn.setAttribute(
        "aria-label",
        isPwd ? "Hide password" : "Show password"
      );
    });
  }

  // restore remember-me
  try {
    if (localStorage.getItem("ms_remember") === "1") {
      const rem = document.getElementById("rememberMe");
      if (rem) rem.checked = true;
    }
  } catch(e){}

})();
</script>
