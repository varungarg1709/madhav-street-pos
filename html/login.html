<div id="loginScreen" class="login-wrapper">

  <div class="login-card">

    <img src="../logo.png" class="login-logo">
    <h1 class="login-title">Madhav Street POS</h1>
    <p class="login-sub">Staff Login</p>

    <form id="loginForm" onsubmit="doLogin(); return false;">

      <!-- USERNAME -->
      <div class="login-field">
        <label for="loginUsername">Username</label>

        <input
          type="text"
          id="loginUsername"
          placeholder="Enter username"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <!-- PASSWORD -->
      <div class="login-field password-field" id="pwdField">

        <label for="loginPassword">Password</label>

        <input
          type="password"
          id="loginPassword"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >

        <button
          type="button"
          id="showPasswordBtn"
          class="toggle-password"
          aria-label="Show password"
        >
          <img class="icon icon-eye"
               src="assets/icons/eye.svg"
               width="18">

          <img class="icon icon-eye-off"
               src="assets/icons/eye-off.svg"
               width="18">
        </button>

      </div>

      <!-- REMEMBER -->
      <div class="remember-row">
        <label class="remember">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
      </div>

      <!-- BUTTON -->
      <button id="loginBtn" type="submit">
        Login
      </button>

    </form>

    <!-- ERROR -->
    <p id="loginError" class="login-error"></p>

  </div>

</div>
